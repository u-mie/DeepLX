name: Build DeepLX ARMv7

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-armv7:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux armv7 binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: arm
          GOARM: 7
        run: |
          mkdir -p dist
          go mod download
          go build -trimpath -ldflags="-s -w" -o dist/deeplx_linux_armv7 .
          chmod +x dist/deeplx_linux_armv7
          file dist/deeplx_linux_armv7

      - name: Package
        run: |
          cd dist
          tar -czf deeplx_linux_armv7.tar.gz deeplx_linux_armv7

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deeplx_linux_armv7
          path: dist/deeplx_linux_armv7.tar.gz
